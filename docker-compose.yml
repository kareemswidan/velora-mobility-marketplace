services:
  db:
    image: mysql:8.0
    environment:
      MYSQL_DATABASE: velora_energy
      MYSQL_ROOT_PASSWORD: password
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-ppassword"]
      interval: 5s
      timeout: 5s
      retries: 20
    volumes:
      - velora_mysql:/var/lib/mysql

  app:
    build: .
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: mysql://root:password@db:3306/velora_energy
      JWT_SECRET: local-container-secret-change-before-production-2026
      NEXT_PUBLIC_APP_URL: http://localhost:3000
    depends_on:
      db:
        condition: service_healthy
    command: sh -c "npx prisma db push && npm run db:seed && npm start"

volumes:
  velora_mysql:
